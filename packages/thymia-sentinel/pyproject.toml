[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "thymia-sentinel"
version = "1.1.0"
description = "Voice AI safety monitoring through multimodal biomarker analysis"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Thymia", email = "support@thymia.ai" }
]
keywords = [
    "voice-ai",
    "safety",
    "mental-health",
    "biomarkers",
    "speech-analysis",
    "multimodal",
    "ai-safety",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Multimedia :: Sound/Audio :: Analysis",
    "Typing :: Typed",
]
dependencies = [
    "websockets>=12.0",
    "pydantic>=2.0",
    "loguru>=0.7.0",
    "typing_extensions>=4.0; python_version < '3.11'",
]

[project.urls]
Homepage = "https://github.com/thymia-ai/thymia-sentinel-integrations"
Documentation = "https://github.com/thymia-ai/thymia-sentinel-integrations#readme"
Repository = "https://github.com/thymia-ai/thymia-sentinel-integrations"
Issues = "https://github.com/thymia-ai/thymia-sentinel-integrations/issues"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/thymia_sentinel"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.9"
strict = true
